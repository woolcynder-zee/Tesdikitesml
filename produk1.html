<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
<title id="pageTitle">Loading...</title>
<link href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=DM+Sans:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>
:root {
  --blue:      #00b4ff;
  --blue-dark: #0070cc;
  --blue-glow: rgba(0,180,255,0.35);
  --bg:        #080b12;
  --surface:   #0e1220;
  --surface2:  #141826;
  --border:    rgba(255,255,255,0.07);
  --text:      #f0f0f0;
  --muted:     #7a8099;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

html { scroll-behavior:smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  overflow-x: hidden;
}

/* NOISE OVERLAY */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.04'/%3E%3C/svg%3E");
  pointer-events: none;
  z-index: 0;
  opacity: 0.4;
}

/* CONTAINER */
.container {
  max-width: 480px;
  margin: auto;
  min-height: 100vh;
  position: relative;
  z-index: 1;
  animation: fadeUp 0.6s cubic-bezier(0.22,1,0.36,1) both;
}

@keyframes fadeUp {
  from { opacity:0; transform:translateY(28px); }
  to   { opacity:1; transform:translateY(0); }
}

/* HEADER */
.header {
  padding: 14px 18px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  background: rgba(8,11,18,0.85);
  backdrop-filter: blur(14px);
  -webkit-backdrop-filter: blur(14px);
  border-bottom: 1px solid var(--border);
  position: sticky;
  top: 0;
  z-index: 100;
}

.logo {
  font-family: 'Rajdhani', sans-serif;
  font-size: 26px;
  font-weight: 700;
  letter-spacing: 3px;
  color: var(--blue);
  text-shadow: 0 0 18px var(--blue-glow), 0 0 40px rgba(0,180,255,0.15);
}

.logo span {
  color: white;
  opacity: 0.5;
  font-size: 12px;
  font-family: 'DM Sans', sans-serif;
  letter-spacing: 1px;
  font-weight: 400;
  margin-left: 6px;
  vertical-align: middle;
}

.menu { display:flex; gap:4px; }

.menu a {
  color: var(--muted);
  text-decoration: none;
  font-size: 11.5px;
  font-weight: 500;
  letter-spacing: 0.5px;
  padding: 6px 12px;
  border-radius: 8px;
  transition: all 0.25s;
}

.menu a:hover { color:white; background:rgba(255,255,255,0.06); }

.menu a.active {
  color: white;
  background: var(--blue);
  box-shadow: 0 0 14px var(--blue-glow);
}

/* LIVE BAR */
.live-bar {
  display: flex;
  align-items: center;
  gap: 8px;
  padding: 8px 18px;
  background: rgba(0,180,255,0.06);
  border-bottom: 1px solid rgba(0,180,255,0.1);
  font-size: 11px;
  color: var(--muted);
}

.live-dot {
  width: 7px; height: 7px;
  background: #2dff7e;
  border-radius: 50%;
  box-shadow: 0 0 8px #2dff7e;
  animation: pulse 1.5s infinite;
}

@keyframes pulse {
  0%,100% { opacity:1; transform:scale(1); }
  50%      { opacity:0.5; transform:scale(1.3); }
}

.live-bar strong { color:white; }

/* SLIDER */
.slider-wrapper {
  position: relative;
  overflow: hidden;
  margin: 16px;
  border-radius: 20px;
  box-shadow:
    0 0 0 1px var(--border),
    0 8px 40px rgba(0,0,0,0.6),
    0 0 60px rgba(0,180,255,0.08);
  cursor: grab;
  user-select: none;
}

.slider-wrapper:active { cursor:grabbing; }

.slider {
  display: flex;
  transition: transform 0.45s cubic-bezier(0.25,1,0.5,1);
  will-change: transform;
}

.slide { min-width:100%; position:relative; }

.slide img {
  width: 100%;
  display: block;
  border-radius: 20px;
  object-fit: cover;
  aspect-ratio: 4/3;
  transition: transform 0.3s;
}

.slide img:hover { transform:scale(1.015); }

/* Slide counter */
.slide-count {
  position: absolute;
  bottom: 12px; right: 14px;
  background: rgba(0,0,0,0.65);
  backdrop-filter: blur(8px);
  color: white;
  font-size: 11px;
  font-weight: 600;
  padding: 4px 10px;
  border-radius: 20px;
  letter-spacing: 1px;
}

/* Arrows */
.arrow {
  position: absolute;
  top: 50%;
  transform: translateY(-50%);
  width: 34px; height: 34px;
  border: 1px solid rgba(255,255,255,0.12);
  border-radius: 50%;
  background: rgba(0,0,0,0.55);
  backdrop-filter: blur(6px);
  color: white;
  font-size: 13px;
  cursor: pointer;
  transition: all 0.25s;
  z-index: 10;
  display: flex;
  align-items: center;
  justify-content: center;
}

.arrow:hover {
  background: var(--blue);
  box-shadow: 0 0 14px var(--blue-glow);
  border-color: transparent;
}

.left  { left: 12px; }
.right { right: 12px; }

/* Dots */
.dots {
  display: flex;
  justify-content: center;
  gap: 5px;
  margin: 10px 0 4px;
}

.dot {
  width: 6px; height: 6px;
  border-radius: 3px;
  background: rgba(255,255,255,0.18);
  cursor: pointer;
  transition: all 0.3s;
}

.dot.active {
  width: 22px;
  background: var(--blue);
  box-shadow: 0 0 8px var(--blue-glow);
}

/* CONTENT */
.content { padding:18px 16px 32px; }

/* Badges */
.badges {
  display: flex;
  gap: 8px;
  flex-wrap: wrap;
  margin-bottom: 16px;
}

.badge {
  display: inline-flex;
  align-items: center;
  gap: 5px;
  padding: 5px 12px;
  border-radius: 8px;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 0.5px;
}

.badge-blue {
  background: rgba(0,180,255,0.12);
  color: var(--blue);
  border: 1px solid rgba(0,180,255,0.28);
}

.badge-green {
  background: rgba(45,255,126,0.1);
  color: #2dff7e;
  border: 1px solid rgba(45,255,126,0.25);
}

.badge-gold {
  background: rgba(255,196,0,0.1);
  color: #ffc400;
  border: 1px solid rgba(255,196,0,0.25);
}

/* Product title */
.title {
  font-family: 'Rajdhani', sans-serif;
  font-size: 30px;
  font-weight: 700;
  letter-spacing: 2px;
  line-height: 1.1;
  margin-bottom: 4px;
}

.subtitle {
  color: var(--muted);
  font-size: 13px;
  margin-bottom: 14px;
}

/* Price block */
.price-block {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 20px;
}

.price {
  font-family: 'Rajdhani', sans-serif;
  color: var(--blue);
  font-size: 34px;
  font-weight: 700;
  text-shadow: 0 0 20px var(--blue-glow);
  letter-spacing: 1px;
}

.price-old {
  color: var(--muted);
  font-size: 15px;
  text-decoration: line-through;
}

.discount-tag {
  background: rgba(0,180,255,0.12);
  color: var(--blue);
  font-size: 11px;
  font-weight: 700;
  padding: 3px 8px;
  border-radius: 6px;
  border: 1px solid rgba(0,180,255,0.25);
}

/* Divider */
.divider {
  height: 1px;
  background: linear-gradient(90deg, transparent, var(--border), transparent);
  margin: 18px 0;
}

/* Stats row */
.stats-row {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 10px;
  margin-bottom: 16px;
}

.stat-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 14px;
  padding: 14px 10px;
  text-align: center;
  transition: all 0.25s;
}

.stat-card:hover {
  border-color: rgba(0,180,255,0.3);
  background: var(--surface2);
  transform: translateY(-2px);
  box-shadow: 0 6px 20px rgba(0,180,255,0.08);
}

.stat-icon  { font-size:20px; margin-bottom:5px; }

.stat-value {
  font-family: 'Rajdhani', sans-serif;
  font-size: 16px;
  font-weight: 700;
  color: white;
}

.stat-label {
  font-size: 10px;
  color: var(--muted);
  margin-top: 2px;
  letter-spacing: 0.3px;
}

/* Detail cards */
.detail-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  margin-bottom: 16px;
}

.detail-card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 16px;
  padding: 16px;
  transition: all 0.25s;
}

.detail-card:hover {
  border-color: rgba(0,180,255,0.25);
  transform: translateY(-2px);
  box-shadow: 0 8px 24px rgba(0,0,0,0.3);
}

.detail-card-title {
  font-size: 10px;
  font-weight: 700;
  letter-spacing: 1.5px;
  color: var(--blue);
  text-transform: uppercase;
  margin-bottom: 10px;
  display: flex;
  align-items: center;
  gap: 6px;
}

.detail-list {
  list-style: none;
  display: flex;
  flex-direction: column;
  gap: 7px;
}

.detail-list li {
  display: flex;
  align-items: flex-start;
  gap: 7px;
  font-size: 12.5px;
  color: #c8cce0;
  line-height: 1.4;
}

.detail-list li::before {
  content: '';
  width: 5px; height: 5px;
  border-radius: 50%;
  background: var(--blue);
  margin-top: 5px;
  flex-shrink: 0;
  box-shadow: 0 0 6px var(--blue-glow);
}

/* Guarantee strip */
.guarantee {
  display: grid;
  grid-template-columns: repeat(3,1fr);
  gap: 8px;
  margin: 16px 0;
}

.guarantee-item {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 12px 8px;
  text-align: center;
}

.guarantee-icon  { font-size:18px; margin-bottom:4px; }
.guarantee-label { font-size:10px; color:var(--muted); line-height:1.3; }

/* CTA button */
.cta-section { margin-top:20px; }

.wa-btn {
  display: block;
  width: 100%;
  text-align: center;
  padding: 16px;
  border-radius: 16px;
  text-decoration: none;
  color: white;
  font-family: 'Rajdhani', sans-serif;
  font-size: 18px;
  font-weight: 700;
  letter-spacing: 2px;
  background: linear-gradient(135deg, var(--blue), var(--blue-dark));
  box-shadow: 0 6px 30px rgba(0,180,255,0.35), inset 0 1px 0 rgba(255,255,255,0.15);
  transition: all 0.3s;
  position: relative;
  overflow: hidden;
}

.wa-btn::before {
  content: '';
  position: absolute;
  top: 0; left: -100%;
  width: 100%; height: 100%;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,0.12), transparent);
  transition: left 0.5s;
}

.wa-btn:hover::before { left:100%; }

.wa-btn:hover {
  transform: translateY(-2px);
  box-shadow: 0 10px 40px rgba(0,180,255,0.5);
}

.wa-btn:active { transform:translateY(0); }

.wa-btn-sub {
  font-size: 11px;
  font-family: 'DM Sans', sans-serif;
  font-weight: 400;
  opacity: 0.8;
  letter-spacing: 0.5px;
  margin-top: 2px;
}

/* Safe note */
.safe-note {
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
  margin-top: 12px;
  font-size: 11px;
  color: var(--muted);
}

/* IMAGE MODAL */
.image-modal {
  display: none;
  position: fixed;
  inset: 0;
  z-index: 9999;
  background: rgba(0,0,0,0.94);
  justify-content: center;
  align-items: center;
  padding: 20px;
  backdrop-filter: blur(10px);
  animation: modalIn 0.2s ease both;
}

@keyframes modalIn {
  from { opacity:0; } to { opacity:1; }
}

.image-modal.show { display:flex; }

.modal-inner {
  position: relative;
  max-width: 520px;
  width: 100%;
  animation: scaleIn 0.25s cubic-bezier(0.34,1.56,0.64,1) both;
}

@keyframes scaleIn {
  from { transform:scale(0.88); opacity:0; }
  to   { transform:scale(1);    opacity:1; }
}

.image-modal img {
  width: 100%;
  border-radius: 18px;
  box-shadow: 0 0 60px rgba(0,180,255,0.2);
}

.close-btn {
  position: absolute;
  top: -14px; right: -14px;
  width: 36px; height: 36px;
  background: var(--blue);
  border: none;
  border-radius: 50%;
  color: white;
  font-size: 16px;
  cursor: pointer;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 16px var(--blue-glow);
  transition: transform 0.2s;
}

.close-btn:hover { transform:scale(1.15) rotate(90deg); }

/* TOAST */
.toast {
  position: fixed;
  bottom: 24px;
  left: 50%;
  transform: translateX(-50%) translateY(60px);
  background: var(--surface2);
  border: 1px solid rgba(45,255,126,0.3);
  color: #2dff7e;
  padding: 10px 20px;
  border-radius: 12px;
  font-size: 12px;
  font-weight: 600;
  z-index: 10000;
  transition: transform 0.35s cubic-bezier(0.34,1.56,0.64,1);
  white-space: nowrap;
  pointer-events: none;
}

.toast.show { transform:translateX(-50%) translateY(0); }

/* FOOTER */
.footer {
  text-align: center;
  padding: 20px 16px;
  border-top: 1px solid var(--border);
  color: var(--muted);
  font-size: 11px;
  line-height: 1.8;
}

.footer strong { color:var(--blue); }
</style>
</head>
<body>

<div class="container">
  <div class="header">
    <div class="logo" id="logoToko"></div>
    <div class="menu">
      <a href="#" class="active">SPEK</a>
      <a id="menuStok" href="#" target="_blank">STOK &amp; TESTI</a>
    </div>
  </div>

  <div class="live-bar">
    <div class="live-dot"></div>
    <span id="liveBarText"></span>
  </div>

  <div class="slider-wrapper" id="sliderWrapper">
    <button class="arrow left"  onclick="prevSlide()" aria-label="Prev">❮</button>
    <div class="slider" id="slider"></div>
    <button class="arrow right" onclick="nextSlide()" aria-label="Next">❯</button>
    <div class="slide-count" id="slideCount"></div>
  </div>

  <div class="dots" id="dots"></div>

  <div class="content">
    <div class="badges" id="badgesEl"></div>
    <div class="title"    id="titleEl"></div>
    <div class="subtitle" id="subtitleEl"></div>
    <div class="price-block" id="priceBlockEl"></div>
    <div class="stats-row"   id="statsRowEl"></div>
    <div class="divider"></div>
    <div class="detail-grid" id="detailGridEl"></div>
    <div class="guarantee" id="guaranteeEl"></div>
    <div class="divider"></div>
    <div class="cta-section">
      <a id="waBtn" class="wa-btn" href="#" target="_blank">
        💬 CHAT WHATSAPP
        <div class="wa-btn-sub">Fast Respon</div>
      </a>
    </div>
  </div>

  <div class="footer">
    © 2026 <strong id="footerToko"></strong><br>
    <span id="footerSub"></span>
  </div>
</div>

<!-- IMAGE MODAL -->
<div id="imageModal" class="image-modal" onclick="handleModalClick(event)">
  <div class="modal-inner">
    <button class="close-btn" onclick="closeImage()">✕</button>
    <img id="modalImg" src="" alt="Preview">
  </div>
</div>

<!-- TOAST -->
<div id="toast" class="toast"></div>

<script>
/* ═══════════════════════════════════════════
   DATA PRODUK — Edit semua konten di sini
═══════════════════════════════════════════ */
const produk = {
  toko:     "BATCHI",
  tokoSub:  "STORE",
  liveBar:  "<strong>READY STOCK</strong> — Gas Beli 🔥",
  badge:    [
    { type: "green", text: "✓ READY STOCK" }
  ],
  title:    "POLOSAN EX IMMO",
  subtitle: "Mobile Legends",
  price:    "Rp 80.000",
  oldPrice: "",          // isi jika ada coret, kosongkan jika tidak
  whatsapp: "62882008925633",
  images: [
    "https://files.catbox.moe/lau8ih.jpg",
    "https://files.catbox.moe/gl6mcv.jpg",
    "https://files.catbox.moe/6xrn7n.jpg",
    "https://files.catbox.moe/a2rsp0.jpg",
    "https://files.catbox.moe/aiwr99.jpg",
    "https://files.catbox.moe/j5n4bw.jpg",
    ""
  ].filter(img => img && img.trim() !== ""),
  stats: [
    { icon: "🎮", value: "167",  label: "Total Skin" },
    { icon: "⚔️", value: "MAX",  label: "Total Hero" },
    { icon: "🏆", value: "MAX",  label: "Emblem"     }
  ],
  infoAkun: [
    "Rank Legend I",
    "Ex Rank Immortal",
    "Emblem Max",
    "Hero Max"
  ],
  keterangan: [
    "Take Sgmail Fresh",
    "No Minus",
    "Akun Fresh Hasil Buy",
    "-"
  ],
  guarantee: [
    { icon: "📦", label: "Stok Fresh"  },
    { icon: "🤝", label: "Siap Rekber" }
  ],
  footerSub: "Jual beli akun ML terpercaya &amp; aman",
  menuStokUrl: "https://whatsapp.com/channel/0029VbCTWliEQIahjF5pw73J"
};

/* ═══════════════════════════════════════════
   RENDER — Jangan ubah kode di bawah ini
═══════════════════════════════════════════ */
(function render() {
  // Page title
  document.getElementById('pageTitle').textContent =
    produk.toko + ' ' + produk.tokoSub + ' — ' + produk.title;

  // Logo
  document.getElementById('logoToko').innerHTML =
    produk.toko + '<span>' + produk.tokoSub + '</span>';

  // Menu stok link
  document.getElementById('menuStok').href = produk.menuStokUrl;

  // Live bar
  document.getElementById('liveBarText').innerHTML = produk.liveBar;

  // Slider images
  const sliderEl = document.getElementById('slider');
  produk.images.forEach((src, i) => {
    const slide = document.createElement('div');
    slide.className = 'slide';
    const img = document.createElement('img');
    img.src = src;
    img.alt = 'Preview ' + (i + 1);
    img.loading = i === 0 ? 'eager' : 'lazy';
    img.onclick = () => openImage(src);
    slide.appendChild(img);
    sliderEl.appendChild(slide);
  });

  // Badges
  const badgesEl = document.getElementById('badgesEl');
  produk.badge.forEach(b => {
    const span = document.createElement('span');
    const typeClass = { blue:'badge-blue', green:'badge-green', gold:'badge-gold' };
    span.className = 'badge ' + (typeClass[b.type] || 'badge-blue');
    span.textContent = b.text;
    badgesEl.appendChild(span);
  });

  // Title & subtitle
  document.getElementById('titleEl').textContent    = produk.title;
  document.getElementById('subtitleEl').textContent = produk.subtitle;

  // Price block
  const priceBlock = document.getElementById('priceBlockEl');
  const priceDiv = document.createElement('div');
  priceDiv.className = 'price';
  priceDiv.textContent = produk.price;
  priceBlock.appendChild(priceDiv);

  if (produk.oldPrice) {
    const oldDiv = document.createElement('div');
    oldDiv.className = 'price-old';
    oldDiv.textContent = produk.oldPrice;
    priceBlock.appendChild(oldDiv);

    // Auto-calculate discount % if both prices are numeric
    const newNum = parseInt(produk.price.replace(/\D/g,''));
    const oldNum = parseInt(produk.oldPrice.replace(/\D/g,''));
    if (oldNum && newNum < oldNum) {
      const pct = Math.round((1 - newNum / oldNum) * 100);
      const tag = document.createElement('div');
      tag.className = 'discount-tag';
      tag.textContent = '-' + pct + '%';
      priceBlock.appendChild(tag);
    }
  }

  // Stats
  const statsEl = document.getElementById('statsRowEl');
  produk.stats.forEach(s => {
    statsEl.innerHTML +=
      `<div class="stat-card">
         <div class="stat-icon">${s.icon}</div>
         <div class="stat-value">${s.value}</div>
         <div class="stat-label">${s.label}</div>
       </div>`;
  });

  // Info akun & keterangan cards
  const detailEl = document.getElementById('detailGridEl');
  const makeCard = (title, items) => {
    const liItems = items.map(i => `<li>${i}</li>`).join('');
    return `<div class="detail-card">
              <div class="detail-card-title">${title}</div>
              <ul class="detail-list">${liItems}</ul>
            </div>`;
  };
  detailEl.innerHTML =
    makeCard('📊 INFO AKUN', produk.infoAkun) +
    makeCard('⚠️ KETERANGAN', produk.keterangan);

  // Guarantee strip
  const guarEl = document.getElementById('guaranteeEl');
  produk.guarantee.forEach(g => {
    guarEl.innerHTML +=
      `<div class="guarantee-item">
         <div class="guarantee-icon">${g.icon}</div>
         <div class="guarantee-label">${g.label}</div>
       </div>`;
  });

  // WhatsApp button
  const waBtn = document.getElementById('waBtn');
  waBtn.href = 'https://wa.me/' + produk.whatsapp;

  // Footer
  document.getElementById('footerToko').textContent  = produk.toko + ' ' + produk.tokoSub;
  document.getElementById('footerSub').innerHTML     = produk.footerSub;
})();

/* ═══════════════════════════════════════════
   SLIDER
═══════════════════════════════════════════ */
const dotsEl   = document.getElementById('dots');
const countEl  = document.getElementById('slideCount');
const wrapper  = document.getElementById('sliderWrapper');
const sliderEl = document.getElementById('slider');
const total    = produk.images.filter(img => img && img.trim() !== "").length;

let index = 0, startX = 0, isDrag = false, autoPlay;

// Build dots
for (let i = 0; i < total; i++) {
  const d = document.createElement('div');
  d.className = 'dot' + (i === 0 ? ' active' : '');
  d.addEventListener('click', () => goSlide(i));
  dotsEl.appendChild(d);
}

const allDots = () => document.querySelectorAll('.dot');

function updateSlider() {
  sliderEl.style.transform = `translateX(-${index * 100}%)`;
  allDots().forEach((d, i) => d.classList.toggle('active', i === index));
  countEl.textContent = `${index + 1} / ${total}`;
}

function nextSlide() { index = (index + 1) % total; updateSlider(); }
function prevSlide() { index = (index - 1 + total) % total; updateSlider(); }
function goSlide(i)  { index = i; updateSlider(); }

function startAuto() { autoPlay = setInterval(nextSlide, 4500); }
function stopAuto()  { clearInterval(autoPlay); }

updateSlider();
startAuto();

wrapper.addEventListener('mouseenter', stopAuto);
wrapper.addEventListener('mouseleave', startAuto);

sliderEl.addEventListener('touchstart', e => { startX = e.touches[0].clientX; }, { passive: true });
sliderEl.addEventListener('touchend',   e => {
  const diff = startX - e.changedTouches[0].clientX;
  if (Math.abs(diff) > 45) diff > 0 ? nextSlide() : prevSlide();
  stopAuto(); startAuto();
});

sliderEl.addEventListener('mousedown',  e => { isDrag = true; startX = e.clientX; });
window.addEventListener('mouseup',      e => {
  if (!isDrag) return;
  isDrag = false;
  const diff = startX - e.clientX;
  if (Math.abs(diff) > 45) diff > 0 ? nextSlide() : prevSlide();
});

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight') nextSlide();
  if (e.key === 'ArrowLeft')  prevSlide();
  if (e.key === 'Escape')     closeImage();
});

/* ═══════════════════════════════════════════
   IMAGE MODAL
═══════════════════════════════════════════ */
function openImage(src) {
  document.getElementById('modalImg').src = src;
  document.getElementById('imageModal').classList.add('show');
  document.body.style.overflow = 'hidden';
}

function closeImage() {
  document.getElementById('imageModal').classList.remove('show');
  document.body.style.overflow = '';
}

function handleModalClick(e) {
  if (e.target === document.getElementById('imageModal')) closeImage();
}

/* ═══════════════════════════════════════════
   TOAST
═══════════════════════════════════════════ */
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2500);
}

document.getElementById('waBtn').addEventListener('click', () => {
  showToast('✅ Membuka WhatsApp...');
});
</script>
